name: multi_job

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Quality gate
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint

  # JOB 2: Build — hanya jalan kalau lint sukses
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]                 # <-- ketergantungan antar-job
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with: { name: build-info, path: dist/build-info.json }

  # JOB 3: Package — hanya di push ke main (bukan di PR)
  package:
    name: Package (main only)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with: { name: build-info }
      - name: Tampilkan hasil
        run: |
          echo "Siap di-package. Isi build-info:"
          cat build-info.json